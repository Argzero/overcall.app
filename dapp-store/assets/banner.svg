<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#15082E"/>

  <!-- Sparkles -->
  <g fill="#F5D670">
    <circle cx="120" cy="90" r="3"/>
    <circle cx="180" cy="60" r="1.5"/>
    <circle cx="240" cy="120" r="2"/>
    <circle cx="320" cy="80" r="2.5"/>
    <circle cx="60" cy="220" r="2"/>
    <circle cx="180" cy="500" r="3"/>
    <circle cx="80" cy="520" r="2"/>
    <circle cx="440" cy="540" r="1.5"/>
    <circle cx="1100" cy="100" r="2"/>
    <circle cx="1140" cy="500" r="2.5"/>
    <circle cx="1060" cy="560" r="1.5"/>
  </g>

  <!-- Trail: stacked angled rectangles spanning most of the canvas -->
  <g transform="translate(960 350) rotate(-22)">
    <rect x="-880" y="-30" width="860" height="60" fill="#F5D670" opacity="0.08" rx="30"/>
    <rect x="-680" y="-22" width="660" height="44" fill="#F5D670" opacity="0.18" rx="22"/>
    <rect x="-480" y="-14" width="460" height="28" fill="#F5D670" opacity="0.36" rx="14"/>
    <rect x="-280" y="-8"  width="260" height="16" fill="#F5D670" opacity="0.62" rx="8"/>
  </g>

  <!-- Coin: outer ring + inner face -->
  <circle cx="960" cy="350" r="142" fill="#C99517"/>
  <circle cx="960" cy="350" r="124" fill="#F5D670"/>
  <circle cx="960" cy="350" r="70" fill="none" stroke="#15082E" stroke-width="22"/>

  <!-- Wordmark on the left -->
  <text x="80" y="360" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="120" fill="#F5D670" letter-spacing="-2">OverCall</text>
  <text x="80" y="430" font-family="Helvetica, Arial, sans-serif" font-weight="500" font-size="36" fill="#A993D8">Pay-by-phone for Solana</text>

  <!-- Accent star sparkle -->
  <g transform="translate(1060 268)" fill="#FFFFFF">
    <path d="M 0 -14 L 3 -3 L 14 0 L 3 3 L 0 14 L -3 3 L -14 0 L -3 -3 Z"/>
  </g>
</svg>
